<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>T-FIT Splash</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .splash-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(ellipse at center bottom, #1a0000 0%, #0a0a0a 40%, #000 70%);
        }

        /* ===== BACKGROUND GYM ATMOSPHERE ===== */
        .gym-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 80%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 30%, rgba(220, 38, 38, 0.03) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(220, 38, 38, 0.03) 0%, transparent 40%);
            animation: bgPulse 3s ease-in-out infinite;
        }

        @keyframes bgPulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== FLOOR ===== */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(to top, rgba(10, 10, 10, 1) 0%, rgba(20, 20, 20, 0.8) 30%, transparent 100%);
            transform: perspective(800px) rotateX(10deg);
            transform-origin: bottom;
        }

        .floor-reflection {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(220, 38, 38, 0.15) 0%, rgba(220, 38, 38, 0.05) 40%, transparent 70%);
            filter: blur(30px);
            animation: floorGlow 2s ease-in-out infinite;
        }

        @keyframes floorGlow {

            0%,
            100% {
                opacity: 0.5;
                transform: translateX(-50%) scale(0.9);
            }

            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.1);
            }
        }

        /* ===== RED ENERGY RING ===== */
        .energy-ring {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%) rotateX(75deg);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(220, 38, 38, 0.6);
            box-shadow:
                0 0 30px rgba(220, 38, 38, 0.4),
                0 0 60px rgba(220, 38, 38, 0.2),
                inset 0 0 30px rgba(220, 38, 38, 0.1);
            animation: ringPulse 2s ease-in-out infinite, ringRotate 8s linear infinite;
            opacity: 0;
        }

        .energy-ring.ring2 {
            width: 350px;
            height: 350px;
            animation-delay: 0.5s;
            border-color: rgba(220, 38, 38, 0.4);
        }

        @keyframes ringPulse {

            0%,
            100% {
                opacity: 0.3;
                box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
            }

            50% {
                opacity: 0.8;
                box-shadow: 0 0 50px rgba(220, 38, 38, 0.6), 0 0 100px rgba(220, 38, 38, 0.2);
            }
        }

        @keyframes ringRotate {
            from {
                transform: translateX(-50%) rotateX(75deg) rotateZ(0deg);
            }

            to {
                transform: translateX(-50%) rotateX(75deg) rotateZ(360deg);
            }
        }

        /* ===== FLOATING DUST PARTICLES ===== */
        .particles-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        .particle.red {
            background: rgba(220, 38, 38, 0.6);
            box-shadow: 0 0 6px rgba(220, 38, 38, 0.4);
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-20vh) translateX(30px);
                opacity: 0;
            }
        }

        /* ===== SPARKS ===== */
        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3333, 0 0 16px rgba(255, 51, 51, 0.5);
            animation: sparkAnim ease-out infinite;
            opacity: 0;
        }

        @keyframes sparkAnim {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--sx), var(--sy)) scale(0);
                opacity: 0;
            }
        }

        /* ===== SMOKE ===== */
        .smoke {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(100, 100, 100, 0.06), transparent 70%);
            filter: blur(40px);
            animation: smokeFloat 12s ease-in-out infinite;
        }

        @keyframes smokeFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }

            25% {
                transform: translate(30px, -20px) scale(1.1);
                opacity: 0.5;
            }

            50% {
                transform: translate(-20px, -40px) scale(1.2);
                opacity: 0.4;
            }

            75% {
                transform: translate(10px, -10px) scale(1.05);
                opacity: 0.6;
            }
        }

        /* ===== RED SWOOSH ARC ===== */
        .red-arc {
            position: absolute;
            top: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 120px;
            opacity: 0;
        }

        .red-arc svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .red-arc-path {
            fill: none;
            stroke: url(#redGradient);
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px rgba(220, 38, 38, 0.8)) drop-shadow(0 0 20px rgba(220, 38, 38, 0.4));
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
        }

        /* ===== MAIN LOGO ===== */
        .logo-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            transform: scale(0.5);
            margin-top: -60px;
        }

        .logo-tfit {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 7rem;
            letter-spacing: -4px;
            position: relative;
            line-height: 1;
        }

        .logo-tfit .t-letter {
            background: linear-gradient(180deg, #ffffff 0%, #c0c0c0 30%, #8a8a8a 50%, #c0c0c0 70%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
        }

        .logo-tfit .dash {
            color: #dc2626;
            -webkit-text-fill-color: #dc2626;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8), 0 0 40px rgba(220, 38, 38, 0.4);
            margin: 0 -2px;
        }

        .logo-tfit .fit-letters {
            background: linear-gradient(180deg, #ff4444 0%, #dc2626 40%, #991b1b 70%, #dc2626 90%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        /* Chrome shimmer effect */
        .logo-tfit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: chromeShimmer 3s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes chromeShimmer {
            0% {
                left: -100%;
            }

            50% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        /* Heartbeat line (ECG) under logo */
        .ecg-line {
            position: relative;
            width: 200px;
            height: 30px;
            margin-top: -10px;
            opacity: 0;
        }

        .ecg-line svg {
            width: 100%;
            height: 100%;
        }

        .ecg-path {
            fill: none;
            stroke: #dc2626;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(220, 38, 38, 0.8));
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
        }

        /* ===== SUBTITLE ===== */
        .subtitle {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(20px);
        }

        .subtitle-line1 {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .subtitle-line1 .highlight {
            color: #dc2626;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }

        /* ===== TAGLINE ===== */
        .tagline {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
        }

        .tagline-text {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .tagline-text .bold {
            font-weight: 900;
            font-style: italic;
            color: #dc2626;
            text-shadow: 0 0 15px rgba(220, 38, 38, 0.6);
        }

        /* ===== LOADING BAR ===== */
        .loading-section {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
        }

        .loading-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .loading-bar-container {
            width: 280px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #991b1b, #dc2626, #ff4444, #dc2626);
            background-size: 200% 100%;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.6), 0 0 30px rgba(220, 38, 38, 0.3);
            animation: barGlow 1.5s ease-in-out infinite;
            position: relative;
        }

        .loading-bar-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            width: 10px;
            height: 10px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff4444, 0 0 30px rgba(255, 68, 68, 0.5);
        }

        @keyframes barGlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* ===== DUMBBELL SILHOUETTES ===== */
        .dumbbell {
            position: absolute;
            z-index: 2;
            opacity: 0;
            filter: brightness(0.3);
        }

        .dumbbell-left {
            bottom: 25%;
            left: 8%;
            font-size: 2.5rem;
            transform: rotate(-20deg);
        }

        .dumbbell-right {
            bottom: 28%;
            right: 8%;
            font-size: 2rem;
            transform: rotate(15deg);
        }

        /* ===== LENS FLARE ===== */
        .lens-flare {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow:
                0 0 30px 15px rgba(255, 68, 68, 0.4),
                0 0 60px 30px rgba(255, 68, 68, 0.2),
                0 0 100px 50px rgba(220, 38, 38, 0.1);
            opacity: 0;
            z-index: 5;
        }

        /* ===== VIGNETTE ===== */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 15;
        }

        /* ===== ELECTRIC ARCS ===== */
        .electric-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 8;
        }

        canvas#electricCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ===== CAMERA ZOOM WRAPPER ===== */
        .camera-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="splash-container" id="splashContainer">
        <div class="gym-bg"></div>

        <!-- Floor -->
        <div class="floor"></div>
        <div class="floor-reflection"></div>

        <!-- Energy Rings -->
        <div class="energy-ring" id="ring1"></div>
        <div class="energy-ring ring2" id="ring2"></div>

        <!-- Smoke -->
        <div class="smoke" style="top: 20%; left: 10%;"></div>
        <div class="smoke" style="top: 30%; right: 5%; animation-delay: -4s;"></div>
        <div class="smoke" style="top: 50%; left: 30%; animation-delay: -7s;"></div>

        <!-- Electric Canvas -->
        <div class="electric-container">
            <canvas id="electricCanvas"></canvas>
        </div>

        <!-- Particles -->
        <div class="particles-container" id="particlesContainer"></div>

        <!-- Red Arc Swoosh -->
        <div class="red-arc" id="redArc">
            <svg viewBox="0 0 500 120">
                <defs>
                    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color: transparent" />
                        <stop offset="20%" style="stop-color: #dc2626" />
                        <stop offset="50%" style="stop-color: #ff4444" />
                        <stop offset="80%" style="stop-color: #dc2626" />
                        <stop offset="100%" style="stop-color: transparent" />
                    </linearGradient>
                </defs>
                <path class="red-arc-path" id="arcPath" d="M 0 100 Q 100 10, 250 20 Q 400 30, 500 100" />
            </svg>
        </div>

        <!-- Lens Flare -->
        <div class="lens-flare" id="lensFlare"></div>

        <!-- Logo -->
        <div class="logo-container" id="logoContainer">
            <div class="logo-tfit">
                <span class="t-letter">T</span><span class="dash">-</span><span class="fit-letters">FIT</span>
            </div>
            <div class="ecg-line" id="ecgLine">
                <svg viewBox="0 0 200 30">
                    <path class="ecg-path" id="ecgPath"
                        d="M 0 15 L 40 15 L 55 15 L 65 5 L 75 25 L 85 5 L 95 25 L 105 15 L 115 15 L 160 15 L 200 15" />
                </svg>
            </div>
        </div>

        <!-- Subtitle -->
        <div class="subtitle" id="subtitle">
            <div class="subtitle-line1">MEU APP <span class="highlight">PERSONAL</span></div>
        </div>

        <!-- Dumbbells -->
        <div class="dumbbell dumbbell-left" id="dumbLeft">🏋️</div>
        <div class="dumbbell dumbbell-right" id="dumbRight">🏋️</div>

        <!-- Tagline -->
        <div class="tagline" id="tagline">
            <div class="tagline-text">TRANSFORME <span class="bold">SEU CORPO</span></div>
        </div>

        <!-- Loading Bar -->
        <div class="loading-section" id="loadingSection">
            <div class="loading-label">CARREGANDO...</div>
            <div class="loading-bar-container">
                <div class="loading-bar-fill" id="loadingBar"></div>
            </div>
        </div>

        <!-- Vignette Overlay -->
        <div class="vignette"></div>
    </div>

    <script>
        // ===== CREATE PARTICLES =====
        const particlesContainer = document.getElementById('particlesContainer');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle' + (Math.random() > 0.6 ? ' red' : '');
            p.style.left = Math.random() * 100 + '%';
            p.style.width = (1 + Math.random() * 3) + 'px';
            p.style.height = p.style.width;
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = (-Math.random() * 15) + 's';
            particlesContainer.appendChild(p);
        }

        // ===== CREATE SPARKS =====
        function createSparks() {
            const container = document.getElementById('splashContainer');
            for (let i = 0; i < 25; i++) {
                const s = document.createElement('div');
                s.className = 'spark';
                s.style.left = (30 + Math.random() * 40) + '%';
                s.style.top = (25 + Math.random() * 30) + '%';
                s.style.setProperty('--sx', (Math.random() * 100 - 50) + 'px');
                s.style.setProperty('--sy', (Math.random() * 80 - 20) + 'px');
                s.style.animationDuration = (0.6 + Math.random() * 1.2) + 's';
                s.style.animationDelay = (1.5 + Math.random() * 2) + 's';
                container.appendChild(s);
            }
        }
        createSparks();

        // ===== ELECTRIC ARCS (Canvas) =====
        const canvas = document.getElementById('electricCanvas');
        const ctx = canvas.getContext('2d');
        let animStartTime = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawLightning(x1, y1, x2, y2, segments, offset) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            const dx = (x2 - x1) / segments;
            const dy = (y2 - y1) / segments;
            for (let i = 1; i < segments; i++) {
                const nx = x1 + dx * i + (Math.random() - 0.5) * offset;
                const ny = y1 + dy * i + (Math.random() - 0.5) * offset;
                ctx.lineTo(nx, ny);
            }
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function animateElectric(timestamp) {
            if (!animStartTime) animStartTime = timestamp;
            const elapsed = (timestamp - animStartTime) / 1000;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Only show electric arcs after 1.5s
            if (elapsed > 1.5 && elapsed < 6) {
                const cx = canvas.width / 2;
                const cy = canvas.height * 0.38;
                const intensity = Math.min(1, (elapsed - 1.5) / 0.5);

                if (Math.random() > 0.6) {
                    ctx.strokeStyle = `rgba(220, 38, 38, ${0.4 * intensity})`;
                    ctx.lineWidth = 1;
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 10;

                    const angle = Math.random() * Math.PI * 2;
                    const len = 80 + Math.random() * 100;
                    drawLightning(
                        cx + Math.cos(angle) * 40,
                        cy + Math.sin(angle) * 20,
                        cx + Math.cos(angle) * len,
                        cy + Math.sin(angle) * len * 0.6,
                        8, 20
                    );

                    ctx.shadowBlur = 0;
                }

                // Small flickers
                if (Math.random() > 0.7) {
                    ctx.strokeStyle = `rgba(255, 100, 100, ${0.3 * intensity})`;
                    ctx.lineWidth = 0.5;
                    const a2 = Math.random() * Math.PI * 2;
                    const l2 = 30 + Math.random() * 60;
                    drawLightning(
                        cx + Math.cos(a2) * 60, cy + Math.sin(a2) * 30,
                        cx + Math.cos(a2) * (60 + l2), cy + Math.sin(a2) * (30 + l2 * 0.5),
                        5, 12
                    );
                }
            }

            requestAnimationFrame(animateElectric);
        }
        requestAnimationFrame(animateElectric);

        // ===== ANIMATION TIMELINE =====
        const timeline = [
            // 0s: Start dark, rings fade in
            {
                time: 0, action: () => {
                    document.getElementById('ring1').style.animation = 'ringPulse 2s ease-in-out infinite, ringRotate 8s linear infinite';
                    document.getElementById('ring2').style.animation = 'ringPulse 2s ease-in-out 0.5s infinite, ringRotate 8s linear infinite';
                    document.getElementById('ring1').style.opacity = '1';
                    document.getElementById('ring2').style.opacity = '1';
                }
            },

            // 0.5s: Lens flare appears
            {
                time: 500, action: () => {
                    const flare = document.getElementById('lensFlare');
                    flare.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
                    flare.style.opacity = '1';
                    flare.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    setTimeout(() => {
                        flare.style.transform = 'translate(-50%, -50%) scale(1)';
                        flare.style.opacity = '0.6';
                    }, 600);
                }
            },

            // 1s: Logo appears with zoom
            {
                time: 1000, action: () => {
                    const logo = document.getElementById('logoContainer');
                    logo.style.transition = 'opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    logo.style.opacity = '1';
                    logo.style.transform = 'scale(1)';
                }
            },

            // 1.5s: ECG line draws
            {
                time: 1500, action: () => {
                    const ecg = document.getElementById('ecgLine');
                    ecg.style.transition = 'opacity 0.4s ease';
                    ecg.style.opacity = '1';
                    const path = document.getElementById('ecgPath');
                    path.style.transition = 'stroke-dashoffset 1s ease-in-out';
                    path.style.strokeDashoffset = '0';
                }
            },

            // 1.8s: Red arc swoosh
            {
                time: 1800, action: () => {
                    const arc = document.getElementById('redArc');
                    arc.style.transition = 'opacity 0.3s ease';
                    arc.style.opacity = '1';
                    const path = document.getElementById('arcPath');
                    path.style.transition = 'stroke-dashoffset 0.8s ease-out';
                    path.style.strokeDashoffset = '0';
                }
            },

            // 2s: Subtitle
            {
                time: 2000, action: () => {
                    const sub = document.getElementById('subtitle');
                    sub.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    sub.style.opacity = '1';
                    sub.style.transform = 'translateY(0)';
                }
            },

            // 2.3s: Dumbbells
            {
                time: 2300, action: () => {
                    ['dumbLeft', 'dumbRight'].forEach(id => {
                        const el = document.getElementById(id);
                        el.style.transition = 'opacity 0.8s ease';
                        el.style.opacity = '0.4';
                    });
                }
            },

            // 2.5s: Tagline
            {
                time: 2500, action: () => {
                    const tag = document.getElementById('tagline');
                    tag.style.transition = 'opacity 0.8s ease';
                    tag.style.opacity = '1';
                }
            },

            // 2.8s: Loading bar starts
            {
                time: 2800, action: () => {
                    const loading = document.getElementById('loadingSection');
                    loading.style.transition = 'opacity 0.5s ease';
                    loading.style.opacity = '1';

                    const bar = document.getElementById('loadingBar');
                    bar.style.transition = 'width 4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    bar.style.width = '100%';
                }
            },

            // 6s: Camera zoom in + fade
            {
                time: 6000, action: () => {
                    const container = document.getElementById('splashContainer');
                    container.style.transition = 'transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease';
                    container.style.transform = 'scale(1.3)';
                    container.style.opacity = '0';
                }
            },
        ];

        // Execute timeline
        timeline.forEach(item => {
            setTimeout(item.action, item.time);
        });
    </script>
</body>

</html>
