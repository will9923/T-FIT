name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: List Files
        run: ls -R

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          mkdir -p www
          echo "<html><body>TFIT</body></html>" > www/index.html
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tfit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Android AAB
        if: secrets.ANDROID_KEYSTORE_FILE != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 --decode > android/app/release-key.jks
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB
        if: secrets.ANDROID_KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v3
        with:
          name: tfit-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
