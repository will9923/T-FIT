name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Patch Capacitor Config (Optional)
        run: |
          # Just ensure everything is updated
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tfit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Android AAB (Release)
        run: |
          cd android
          ./gradlew bundleRelease
        # Note: You need to configure signing for this to be valid on Play Store

      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: tfit-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
