name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          mkdir -p www
          echo "<html><body>TFIT</body></html>" > www/index.html
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tfit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Android AAB
        run: |
          if [ -f "keystore_base64.txt" ]; then
            base64 -d keystore_base64.txt > $GITHUB_WORKSPACE/release-key.jks
          elif [ -n "${{ secrets.ANDROID_KEYSTORE_FILE }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 -d > $GITHUB_WORKSPACE/release-key.jks
          fi
          
          if [ -f "$GITHUB_WORKSPACE/release-key.jks" ]; then
            cd android
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release-key.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
          else
            echo "Skipping signed AAB build because no keystore was found."
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: tfit-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
